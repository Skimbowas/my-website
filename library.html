<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css?v=1.2"> 
</head>
<body>

<nav class="side-nav"></nav>

<main>
    <section id="books" class="content-section">
        <h2>Library</h2>
        <div class="book-grid">
            <div class="book-card">
                <div class="book-info">
                    <h3>Saga</h3>
                    <p class="author">Brian K Vaughan</p>
                    <span class="status-tag finished">Read</span>
                </div>
            </div>
            <div class="book-card">
                <div class="book-info">
                    <h3>All-Star Superman</h3>
                    <p class="author">Grant Morrison</p>
                    <span class="status-tag reading">Reading</span>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="script.js"></script>

</body>
</html>
