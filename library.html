<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<nav class="side-nav">
    <div class="nav-item">
        <a href="index.html#home">
            <span class="icon">🏠</span>
            <span class="nav-text">Home</span>
        </a>
    </div>
    <div class="nav-item">
        <a href="photos.html">
            <span class="icon">📸</span>
            <span class="nav-text">Photos</span>
        </a>
    </div>
    <div class="nav-item">
        <a href="library.html">
            <span class="icon">📚</span>
            <span class="nav-text">Library</span>
        </a>
    </div>
</nav>

<main>
    <section id="books" class="content-section">
        <h2>Library</h2>
        <div class="book-grid">
            <div class="book-card">
                <div class="book-info">
                    <h3>Saga</h3>
                    <p class="author">Brian K Vaughan</p>
                    <span class="status-tag finished">Read</span>
                </div>
            </div>
            <div class="book-card">
                <div class="book-info">
                    <h3>All-Star Superman</h3>
                    <p class="author">Grant Morrison</p>
                    <span class="status-tag reading">Reading</span>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
    const sideNav = document.querySelector('.side-nav');
    sideNav.addEventListener('mouseenter', () => sideNav.classList.add('expanded'));
    sideNav.addEventListener('mouseleave', () => sideNav.classList.remove('expanded'));
</script>

</body>
</html>
